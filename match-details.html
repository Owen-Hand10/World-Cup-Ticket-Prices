<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details - World Cup Tickets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 45%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 40%, rgba(255, 193, 7, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 80% 65%, rgba(255, 152, 0, 0.08) 0%, transparent 25%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .top-nav-btn {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.15) 0%, rgba(255, 152, 0, 0.1) 100%);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffc107;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .top-nav-btn:hover {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.25) 0%, rgba(255, 152, 0, 0.2) 100%);
            border-color: rgba(255, 193, 7, 0.5);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
            transform: translateX(-2px);
        }

        .header {
            background: rgba(10, 10, 26, 0.92);
            border-radius: 30px;
            padding: 32px;
            margin-bottom: 30px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 193, 7, 0.15);
            backdrop-filter: blur(18px);
        }

        .breadcrumb {
            margin-bottom: 20px;
        }

        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            color: #999;
            margin: 0 8px;
        }

        .match-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 30px;
            padding: 28px;
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.12), rgba(255, 152, 0, 0.08));
            border-radius: 28px;
            border: 1px solid rgba(255, 193, 7, 0.18);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .team {
            flex: 1;
            text-align: center;
        }

        .team-name {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            letter-spacing: 1px;
        }

        .team-flag {
            font-size: 68px;
            margin-bottom: 14px;
            display: block;
            filter: drop-shadow(0 0 18px rgba(255, 193, 7, 0.35));
        }

        .team-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.18);
            border-radius: 999px;
            padding: 10px 18px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
            color: #fff;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .team-initial {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 193, 7, 0.22);
            color: #0f0f1e;
            font-weight: 900;
            box-shadow: 0 0 14px rgba(255, 193, 7, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #0f0f1e;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.14);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.14);
        }

        .info-section {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 193, 7, 0.12);
            border-radius: 24px;
            padding: 25px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.12);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        }

        .stat-number {
            font-size: 28px;
            color: #ffc107;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.75);
        }

        .vs-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .vs-text {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .match-datetime {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .match-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .detail-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .detail-card h3 {
            font-size: 13px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .detail-card-content {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .detail-card-subtext {
            font-size: 13px;
            color: #999;
            margin-top: 5px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .info-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .info-section h2 {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .info-list li:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #667eea;
            font-weight: 600;
        }

        .stadium-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #999;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f0f7ff 0%, #f5f0ff 100%);
            border: 1px solid #e0e7ff;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        .loading {
            padding: 60px 20px;
            text-align: center;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-container {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .error-container h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }

        .error-container p {
            color: #999;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .match-hero {
                flex-direction: column;
                gap: 20px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .team-name {
                font-size: 24px;
            }

            .team-flag {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading match details...</p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        let currentMatch = null;

        // Initialize
        initPage();

        async function initPage() {
            try {
                const success = await ticketApp.init();
                if (success) {
                    const matchId = TicketApp.getMatchIdFromURL();
                    
                    if (!matchId) {
                        showError('No match selected', 'Please go back and select a match');
                        return;
                    }

                    currentMatch = ticketApp.getMatchById(matchId);
                    if (!currentMatch) {
                        showError('Match not found', 'The match you are looking for does not exist');
                        return;
                    }

                    renderMatchDetails();
                } else {
                    showError('Error Loading Match', 'Failed to load match data');
                }
            } catch (error) {
                console.error('Error loading match:', error);
                showError('Error Loading Match', error.message);
            }
        }

        function renderMatchDetails() {
            const match = currentMatch;
            const dateObj = new Date(match.date + 'T' + match.time);
            const formattedDate = dateObj.toLocaleDateString('en-US', { 
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            const formattedTime = dateObj.toLocaleTimeString('en-US', { 
                hour: '2-digit',
                minute: '2-digit'
            });

            const teamFlags = {
                'Argentina': '🇦🇷', 'France': '🇫🇷', 'Brazil': '🇧🇷', 'Germany': '🇩🇪',
                'Spain': '🇪🇸', 'Italy': '🇮🇹', 'England': '🇬🇧', 'Netherlands': '🇳🇱',
                'Belgium': '🇧🇪', 'Portugal': '🇵🇹', 'Uruguay': '🇺🇾', 'Croatia': '🇭🇷',
                'Denmark': '🇩🇰', 'Tunisia': '🇹🇳', 'Mexico': '🇲🇽', 'Poland': '🇵🇱',
                'Saudi Arabia': '🇸🇦', 'Australia': '🇦🇺', 'Serbia': '🇷🇸', 'Japan': '🇯🇵'
            };

            const homeTeamFlag = teamFlags[match.homeTeam] || '⚽';
            const awayTeamFlag = teamFlags[match.awayTeam] || '⚽';

            const soldPercentage = Math.round((1 - match.ticketsAvailable / match.capacity) * 100);
            const salesVelocity = Math.random() > 0.5 ? 'High' : 'Medium';

            document.getElementById('content').innerHTML = `
                <div class="header">
                    <div class="breadcrumb">
                        <a href="index.html">← Back to Matches</a>
                    </div>

                    <div class="match-hero">
                        <div class="team">
                            <div class="team-flag">${homeTeamFlag}</div>
                            <div class="team-badge"><span class="team-initial">${match.homeTeam.charAt(0)}</span>${match.homeTeam}</div>
                        </div>
                        <div class="vs-container">
                            <div class="vs-text">VS</div>
                            <div class="match-datetime">
                                <div>${formattedDate}</div>
                                <div style="margin-top: 5px; font-size: 16px; font-weight: 700;">${formattedTime}</div>
                            </div>
                        </div>
                        <div class="team">
                            <div class="team-flag">${awayTeamFlag}</div>
                            <div class="team-badge"><span class="team-initial">${match.awayTeam.charAt(0)}</span>${match.awayTeam}</div>
                        </div>
                    </div>

                    <div class="match-details-grid">
                        <div class="detail-card">
                            <h3>Stadium</h3>
                            <div class="detail-card-content">${match.stadium}</div>
                            <div class="detail-card-subtext">${match.city}, ${match.country}</div>
                        </div>
                        <div class="detail-card">
                            <h3>Group Stage</h3>
                            <div class="detail-card-content">${match.group}</div>
                        </div>
                        <div class="detail-card">
                            <h3>Stadium Capacity</h3>
                            <div class="detail-card-content">${match.capacity.toLocaleString()}</div>
                        </div>
                        <div class="detail-card">
                            <h3>Status</h3>
                            <div class="detail-card-content" style="text-transform: capitalize;">${match.status}</div>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <a href="stadium-map.html?matchId=${match.id}" class="action-btn btn-primary">
                        🎫 Select Seats & Get Prices
                    </a>
                    <a href="index.html" class="action-btn btn-secondary">
                        ← Back to Matches
                    </a>
                </div>

                <div class="content">
                    <div class="info-section">
                        <h2>📊 Ticket Availability</h2>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number">${match.ticketsAvailable.toLocaleString()}</div>
                                <div class="stat-label">Available Tickets</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${soldPercentage}%</div>
                                <div class="stat-label">Sold</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${match.capacity.toLocaleString()}</div>
                                <div class="stat-label">Total Capacity</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${salesVelocity}</div>
                                <div class="stat-label">Sales Velocity</div>
                            </div>
                        </div>
                    </div>

                    <div class="info-section">
                        <h2>ℹ️ Match Information</h2>
                        <ul class="info-list">
                            <li>
                                <span class="info-label">Match ID</span>
                                <span class="info-value">${match.id}</span>
                            </li>
                            <li>
                                <span class="info-label">Home Team</span>
                                <span class="info-value">${match.homeTeam}</span>
                            </li>
                            <li>
                                <span class="info-label">Away Team</span>
                                <span class="info-value">${match.awayTeam}</span>
                            </li>
                            <li>
                                <span class="info-label">Kick-off Time</span>
                                <span class="info-value">${formattedTime}</span>
                            </li>
                            <li class="stadium-link">
                                <span class="info-label">Venue</span>
                                <span class="info-value">${match.stadium}</span>
                            </li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function showError(title, message) {
            document.getElementById('content').innerHTML = `
                <div class="error-container">
                    <div class="error-icon">❌</div>
                    <h2>${title}</h2>
                    <p>${message}</p>
                    <a href="index.html" class="action-btn btn-primary" style="display: inline-block; margin-top: 15px; width: auto; padding: 12px 30px;">
                        ← Back to Matches
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Matches - Find and Book Tickets</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 193, 7, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(33, 150, 243, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Hero Video Section */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .hero-image-carousel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            filter: brightness(0.6) contrast(1.15) saturate(1.2);
        }

        .hero-image.active {
            opacity: 1;
        }

        .hero-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1);
            opacity: 0;
        }

        .hero-video.show {
            opacity: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.5) 50%, rgba(15, 15, 30, 0.9) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
        }

        .hero-title {
            font-family: 'Roboto', sans-serif;
            font-size: 120px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.7),
                0 0 40px rgba(255, 193, 7, 0.3),
                4px 4px 0px rgba(255, 193, 7, 0.5);
            animation: titleGlow 3s ease-in-out infinite;
            line-height: 1;
        }

        .hero-subtitle {
            font-size: 24px;
            letter-spacing: 3px;
            margin-top: 30px;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow: 
                    0 10px 30px rgba(0, 0, 0, 0.7),
                    0 0 40px rgba(255, 193, 7, 0.3),
                    4px 4px 0px rgba(255, 193, 7, 0.5);
            }
            50% {
                text-shadow: 
                    0 10px 30px rgba(0, 0, 0, 0.7),
                    0 0 60px rgba(255, 193, 7, 0.6),
                    4px 4px 0px rgba(255, 193, 7, 0.8);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 0.9;
                transform: translateY(0);
            }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            animation: bounce 2s infinite;
        }

        .scroll-indicator svg {
            width: 30px;
            height: 30px;
            stroke: #fff;
            stroke-width: 2;
            fill: none;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-size: 56px;
            margin-bottom: 15px;
            text-shadow: 0 8px 32px rgba(255, 193, 7, 0.3), 0 2px 10px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 50%, #f57c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }

        .header p {
            font-size: 18px;
            opacity: 0.85;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 8px 32px rgba(255, 193, 7, 0.3), 0 2px 10px rgba(0, 0, 0, 0.5); }
            50% { text-shadow: 0 8px 48px rgba(255, 193, 7, 0.6), 0 2px 10px rgba(0, 0, 0, 0.5); }
        }

        .search-filter-section {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            margin-top: 60px;
        }

        .search-filter-section:hover {
            background: rgba(26, 26, 46, 0.95);
            border-color: rgba(255, 193, 7, 0.3);
            box-shadow: 0 20px 80px rgba(255, 193, 7, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .search-bar {
            margin-bottom: 20px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 16px 22px;
            border: 2px solid rgba(255, 193, 7, 0.2);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(15, 15, 30, 0.6);
            color: #fff;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-bar input:focus {
            outline: none;
            border-color: #ffc107;
            background: rgba(15, 15, 30, 0.9);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.3), inset 0 0 10px rgba(255, 193, 7, 0.1);
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 700;
            color: #ffc107;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-group select {
            padding: 12px 16px;
            border: 2px solid rgba(255, 193, 7, 0.2);
            border-radius: 10px;
            font-size: 15px;
            background: rgba(15, 15, 30, 0.6);
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .filter-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .filter-group select:hover {
            border-color: rgba(255, 193, 7, 0.5);
        }

        .filter-group select:focus {
            outline: none;
            border-color: #ffc107;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .clear-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.1) 0%, rgba(255, 152, 0, 0.1) 100%);
            border: 2px solid rgba(255, 193, 7, 0.3);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            color: #ffc107;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .clear-btn:hover {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.2) 0%, rgba(255, 152, 0, 0.2) 100%);
            border-color: #ffc107;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
            transform: translateY(-2px);
        }

        .results-info {
            font-size: 14px;
            color: rgba(255, 193, 7, 0.8);
            margin-bottom: 15px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 193, 7, 0.2);
            letter-spacing: 0.3px;
        }

        .matches-section-header {
            text-align: center;
            margin: 80px 0 40px 0;
            padding: 0 20px;
        }

        .matches-section-header h2 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 50%, #f57c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .matches-section-header p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        .matches-container {
            background: rgba(26, 26, 46, 0.6);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 193, 7, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .match-card {
            padding: 40px;
            border-bottom: 2px solid rgba(255, 193, 7, 0.12);
            cursor: pointer;
            transition: all 0.5s ease, box-shadow 0.5s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            position: relative;
            overflow: hidden;
            min-height: 220px;
            border-radius: 28px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 22px 50px rgba(0,0,0,0.25);
            background: linear-gradient(135deg, rgba(15, 15, 30, 0.92) 0%, rgba(26, 26, 46, 0.92) 100%);
            backdrop-filter: blur(6px);
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 193, 7, 0.12), transparent 28%), radial-gradient(circle at 70% 40%, rgba(255, 152, 0, 0.14), transparent 24%);
            opacity: 0.8;
            pointer-events: none;
            z-index: 0;
        }

        .match-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 193, 7, 0.12), transparent);
            transition: left 0.6s ease;
            z-index: 0;
        }

        .match-card:last-child {
            border-bottom: none;
        }

        .match-card:hover {
            transform: translateY(-5px);
            border-left: 6px solid #ffc107;
            box-shadow: inset 0 0 0 1px rgba(255, 193, 7, 0.15), 0 28px 70px rgba(255, 193, 7, 0.12);
        }

        .match-card:hover::after {
            left: 100%;
        }

        .match-card .match-info,
        .match-card .match-meta,
        .match-card .tickets-info {
            position: relative;
            z-index: 1;
        }

        .match-card.upcoming {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.05) 0%, rgba(255, 152, 0, 0.02) 100%);
        }

        .match-info {
            flex: 1;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        .match-teams {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .team {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            min-width: 140px;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .team-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0 0 1px rgba(255, 193, 7, 0.08);
            backdrop-filter: blur(10px);
            font-size: 16px;
            font-weight: 700;
        }

        .team-initial {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 193, 7, 0.2);
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 0 16px rgba(255, 193, 7, 0.25);
        }

        .team-flag-icon {
            font-size: 22px;
        }

        .vs-badge {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #0f0f1e;
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 18px rgba(255, 193, 7, 0.35);
        }

        .match-details {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 12px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-label {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
        }

        .match-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            white-space: nowrap;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        .stadium-label {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .city-label {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .group-badge {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 900;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
        }

        .tickets-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            text-align: right;
            position: relative;
            z-index: 1;
            min-width: 200px;
        }

        .available-tickets {
            font-size: 20px;
            font-weight: 900;
            color: #4caf50;
            text-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
        }

        .cta-button {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #0f0f1e;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.4s ease;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 193, 7, 0.5);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .empty-state {
            padding: 80px 20px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        .empty-state h2 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.6;
        }

        .empty-state-btn {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #0f0f1e;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
            position: relative;
            overflow: hidden;
        }

        .empty-state-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.4s ease;
        }

        .empty-state-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 193, 7, 0.5);
        }

        .empty-state-btn:hover::before {
            left: 100%;
        }

        .loading {
            padding: 60px 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
        }

        .spinner {
            border: 4px solid rgba(255, 193, 7, 0.1);
            border-top-color: #ffc107;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1.2s linear infinite;
            margin: 0 auto 15px;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.3);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 60px;
                letter-spacing: 4px;
            }

            .hero-subtitle {
                font-size: 16px;
                letter-spacing: 2px;
            }

            .match-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 25px;
                min-height: auto;
            }

            .match-card:hover {
                border-left: 4px solid #ffc107;
                padding-left: 21px;
            }

            .team {
                font-size: 18px;
            }

            .match-meta {
                width: 100%;
                justify-content: space-between;
            }

            .tickets-info {
                width: 100%;
                align-items: flex-start;
                text-align: left;
                min-width: auto;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .match-details {
                gap: 15px;
            }

            .cta-button {
                width: 100%;
                text-align: center;
            }

            .matches-section-header h2 {
                font-size: 32px;
            }
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
        }

        .status-badge.upcoming {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            border-color: rgba(255, 193, 7, 0.4);
        }

        .status-badge.completed {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border-color: rgba(76, 175, 80, 0.4);
        }

        /* World Cup themed additions */
        .world-cup-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="80" fill="none" stroke="white" stroke-width="2"/><path d="M 100 20 Q 150 100 100 180 Q 50 100 100 20" fill="none" stroke="white" stroke-width="1"/><path d="M 20 100 Q 100 150 180 100 Q 100 50 20 100" fill="none" stroke="white" stroke-width="1"/></svg>');
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
        }

        /* Interactive mouse movement effect */
        .parallax-element {
            position: relative;
            transition: transform 0.1s ease-out;
        }

    </style>
</head>
<body>
    <!-- Hero Video Section with Image Carousel -->
    <div class="hero-section">
        <div class="hero-image-carousel" id="heroCarousel">
            <!-- Images will be dynamically loaded here -->
        </div>
        <video class="hero-video show" autoplay muted loop playsinline id="heroVideo">
            <source src="https://media.istockphoto.com/videos/world-cup-stadium-with-crowd-video-id1354505820" type="video/mp4">
            <source src="https://cdn.pixabay.com/vimeo/295299532/soccer-field-83340.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-title">SEATSNAP</div>
            <div class="hero-subtitle">SECURE YOUR PERFECT VIEW</div>
        </div>
        <div class="scroll-indicator">
            <svg viewBox="0 0 24 24">
                <path d="M12 2v16m0 0l-7-7m7 7l7-7"/>
            </svg>
        </div>
    </div>

    <div class="container">
        <!-- Matches Section -->
        <div class="matches-section-header">
            <h2>UPCOMING MATCHES</h2>

        let currentImageIndex = 0;
        let imageCarouselInterval;

        // Initialize hero carousel
        function initHeroCarousel() {
            const carousel = document.getElementById('heroCarousel');
            if (!carousel) return;

            heroBackgroundImages.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'hero-image' + (index === 0 ? ' active' : '');
                img.alt = `World Cup background ${index + 1}`;
                carousel.appendChild(img);
            });

            startImageCarousel();
        }

        function startImageCarousel() {
            if (imageCarouselInterval) {
                clearInterval(imageCarouselInterval);
            }

            const images = document.querySelectorAll('.hero-image');
            if (!images.length) return;

            currentImageIndex = 0;
            images.forEach(img => img.classList.remove('active'));
            images[currentImageIndex].classList.add('active');

            imageCarouselInterval = setInterval(() => {
                const images = document.querySelectorAll('.hero-image');
                if (!images.length) return;
                images[currentImageIndex].classList.remove('active');
                currentImageIndex = (currentImageIndex + 1) % images.length;
                images[currentImageIndex].classList.add('active');
            }, 4000);
        }

        function stopImageCarousel() {
            if (imageCarouselInterval) {
                clearInterval(imageCarouselInterval);
                imageCarouselInterval = null;
            }
        }

        // Initialize carousel when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initHeroCarousel);
        } else {
            initHeroCarousel();
        }

        // DOM elements
        const searchInput = document.getElementById('search-input');
        const dateFilter = document.getElementById('date-filter');
        const cityFilter = document.getElementById('city-filter');
        const clearFiltersBtn = document.getElementById('clear-filters');
        const matchesContainer = document.getElementById('matches-container');
        const resultsInfo = document.getElementById('results-info');

        // State management
        const state = {
            search: '',
            dateFilter: '',
            cityFilter: ''
        };

        let filteredMatches = [];

        // Mouse movement effect
        document.addEventListener('mousemove', (e) => {
            const parallaxElements = document.querySelectorAll('.parallax-element');
            const xPercent = (e.clientX / window.innerWidth) * 2 - 1;
            const yPercent = (e.clientY / window.innerHeight) * 2 - 1;
            
            parallaxElements.forEach((el, index) => {
                const moveX = xPercent * (5 + index * 2);
                const moveY = yPercent * (5 + index * 2);
                el.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        // Initialize
        initPage();

        async function initPage() {
            try {
                const success = await ticketApp.init();
                if (success) {
                    setupEventListeners();
                    populateFilters();
                    renderMatches();
                } else {
                    showError('Failed to load data');
                }
            } catch (error) {
                console.error('Error initializing page:', error);
                showError(error.message);
            }
        }

        function setupEventListeners() {
            searchInput.addEventListener('input', handleSearch);
            dateFilter.addEventListener('change', handleDateFilter);
            cityFilter.addEventListener('change', handleCityFilter);
            clearFiltersBtn.addEventListener('click', clearAllFilters);
        }

        function populateFilters() {
            // Get unique dates
            ticketApp.getUniqueDates().forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                const dateObj = new Date(date);
                option.text = dateObj.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
                dateFilter.appendChild(option);
            });

            // Get unique cities
            ticketApp.getUniqueCities().forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.text = city;
                cityFilter.appendChild(option);
            });
        }

        function handleSearch(e) {
            state.search = e.target.value.toLowerCase();
            applyFilters();
        }

        function handleDateFilter(e) {
            state.dateFilter = e.target.value;
            applyFilters();
        }

        function handleCityFilter(e) {
            state.cityFilter = e.target.value;
            applyFilters();
        }

        function applyFilters() {
            filteredMatches = ticketApp.filterMatches({
                searchText: state.search,
                date: state.dateFilter,
                city: state.cityFilter
            });

            renderMatches();
        }

        function clearAllFilters() {
            state.search = '';
            state.dateFilter = '';
            state.cityFilter = '';

            searchInput.value = '';
            dateFilter.value = '';
            cityFilter.value = '';

            filteredMatches = [...ticketApp.matches];
            renderMatches();
        }

        function renderMatches() {
            updateResultsInfo();

            if (filteredMatches.length === 0) {
                matchesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚽</div>
                        <h2>No Matches Found</h2>
                        <p>Try adjusting your search or filters to discover amazing World Cup matches</p>
                        <button class="empty-state-btn" onclick="document.getElementById('clear-filters').click()">Clear Filters</button>
                    </div>
                `;
                return;
            }

            matchesContainer.innerHTML = filteredMatches.map((match, index) => createMatchCard(match, index)).join('');
        }

        function createMatchCard(match, index) {
            const dateObj = new Date(match.date + 'T' + match.time);
            const formattedDate = dateObj.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric'
            });
            const formattedTime = dateObj.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });

            const statusClass = match.status === 'upcoming' ? 'upcoming' : 'completed';
            const imageUrl = worldCupImages[index % worldCupImages.length];
            const homeFlag = teamFlags[match.homeTeam] || '🏳️';
            const awayFlag = teamFlags[match.awayTeam] || '🏳️';

            return `
                <div class="match-card ${statusClass}" onclick="navigateToMatch('${match.id}')" style="background-image: linear-gradient(135deg, rgba(15, 15, 30, 0.92) 0%, rgba(26, 26, 46, 0.92) 100%), url('${imageUrl}'); background-size: cover; background-position: center;">
                    <div class="match-info">
                        <div class="match-teams">
                            <span class="team">
                                <span class="team-badge"><span class="team-initial">${match.homeTeam.charAt(0)}</span><span class="team-flag-icon">${homeFlag}</span>${match.homeTeam}</span>
                            </span>
                            <span class="vs-badge">⚽ VS ⚽</span>
                            <span class="team">
                                <span class="team-badge"><span class="team-initial">${match.awayTeam.charAt(0)}</span><span class="team-flag-icon">${awayFlag}</span>${match.awayTeam}</span>
                            </span>
                        </div>
                        <div class="match-details">
                            <div class="detail-item">
                                <span class="detail-label">📅</span>
                                <span>${formattedDate}, ${formattedTime}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">🏟️</span>
                                <span>${match.stadium}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📍</span>
                                <span>${match.city}, ${match.country}</span>
                            </div>
                        </div>
                    </div>
                    <div class="match-meta">
                        <span class="group-badge">🏆 ${match.group}</span>
                        <span class="stadium-label">⚡ Capacity: ${match.capacity.toLocaleString()}</span>
                        <span class="status-badge ${statusClass}">${match.status.toUpperCase()}</span>
                    </div>
                    <div class="tickets-info">
                        <div class="available-tickets">✅ ${match.ticketsAvailable} SEATS AVAILABLE</div>
                        <button class="cta-button" onclick="event.stopPropagation(); navigateToMatch('${match.id}')">🎫 SELECT SEATS</button>
                    </div>
                </div>
            `;
        }

        function updateResultsInfo() {
            const total = ticketApp.matches.length;
            const displayed = filteredMatches.length;
            
            if (displayed === total) {
                resultsInfo.textContent = `🌍 Showing all ${total} matches from the World Cup`;
            } else {
                resultsInfo.textContent = `🌍 Showing ${displayed} of ${total} matches`;
            }
        }

        function navigateToMatch(matchId) {
            TicketApp.navigateToMatch(matchId);
        }

        function showError(message) {
            matchesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">❌</div>
                    <h2>Error Loading Matches</h2>
                    <p>${message}</p>
                    <button class="empty-state-btn" onclick="location.reload()">Try Again</button>
                </div>
            `;
        }
    </script>
</body>
</html>
